# Stateful datastores. MinIO would be replaced by managed S3 in cloud (the
# object-store client is S3-compatible — one endpoint change).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: opsverse
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: opsverse
            - name: POSTGRES_DB
              value: opsverse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: opsverse-secrets, key: DB_PASSWORD }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "opsverse", "-d", "opsverse"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata: { name: pgdata }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: opsverse
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: opsverse
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels: { app: qdrant }
  template:
    metadata:
      labels: { app: qdrant }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.4
          ports:
            - containerPort: 6333
          readinessProbe:
            tcpSocket: { port: 6333 }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata: { name: qdrant-data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: opsverse
spec:
  selector: { app: qdrant }
  ports: [{ port: 6333, targetPort: 6333 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: opsverse
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: { name: opsverse-secrets, key: MINIO_ROOT_USER }
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: opsverse-secrets, key: MINIO_ROOT_PASSWORD }
          ports:
            - containerPort: 9000
          readinessProbe:
            exec: { command: ["mc", "ready", "local"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: minio-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata: { name: minio-data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: opsverse
spec:
  selector: { app: minio }
  ports: [{ port: 9000, targetPort: 9000 }]
