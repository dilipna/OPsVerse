# Redis: cache + arq job queue + gateway budget counters. No PVC — everything
# in it is reconstructible (cache) or transient (queue); the durable spend
# record is the Postgres request_ledger.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: opsverse
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: opsverse
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
