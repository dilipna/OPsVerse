name: Eval Gate

# Two deterministic, secret-free layers (see ADR-0005):
#  1. regression CLI over committed report artifacts — a PR cannot commit a
#     report (or delete a metric) that falls below pinned thresholds.
#  2. live retrieval smoke — embeds the committed 200-chunk fixture into a
#     Qdrant service container and asserts hybrid retrieval quality, so
#     retrieval-stack regressions fail the PR even when no report changed.
# LLM-judged quality runs stay local/manual for now: free-tier quota is
# shared with development and a CI consumer could starve it (ADR-0005).

on:
  pull_request:
    paths:
      - "libs/rag/**"
      - "libs/ingestion/**"
      - "libs/evals/**"
      - "apps/api/**"
      - "evalsets/**"
      - "docs/reports/**"
      - ".github/workflows/eval-gate.yml"
  push:
    branches: [main]

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    env:
      FASTEMBED_CACHE_PATH: ~/.cache/fastembed
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-packages --frozen

      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ hashFiles('uv.lock') }}

      - name: Regression thresholds vs committed reports
        run: uv run python -m opsverse_evals.regression

      - name: Live retrieval smoke on CI fixture
        run: uv run python -m opsverse_evals.ci_retrieval_smoke --qdrant http://localhost:6333
